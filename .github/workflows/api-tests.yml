name: Hoteli API Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  api-tests:
    name: Run Postman API Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: hoteli_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo_mysql, mbstring, xml, ctype, json, tokenizer, bcmath

      - name: Install Dependencies
        working-directory: ./hoteli-backend
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Configure Environment
        working-directory: ./hoteli-backend
        run: |
          cp .env.example .env
          sed -i 's/DB_CONNECTION=.*/DB_CONNECTION=mysql/' .env
          sed -i 's/DB_HOST=.*/DB_HOST=127.0.0.1/' .env
          sed -i 's/DB_PORT=.*/DB_PORT=3306/' .env
          sed -i 's/DB_DATABASE=.*/DB_DATABASE=hoteli_test/' .env
          sed -i 's/DB_USERNAME=.*/DB_USERNAME=root/' .env
          sed -i 's/DB_PASSWORD=.*/DB_PASSWORD=root/' .env
          php artisan key:generate
          php artisan migrate --force

      - name: Start Laravel Server
        working-directory: ./hoteli-backend
        run: |
          php artisan serve --host=127.0.0.1 --port=8000 &
          sleep 10

      - name: Run API Tests
        run: |
          npm install -g newman
          newman run postman/Hoteli_API_Tests.postman_collection.json \
            --env-var "baseUrl=http://127.0.0.1:8000"
